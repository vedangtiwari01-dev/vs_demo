# Banking & Loan Processing Rule Type Registry
# Total: 150 rule types organized by category
#
# Validation Strategy:
#   - hardcoded: Use existing hardcoded validation logic (fast, deterministic)
#   - ai_generic: Use AI-powered generic rule evaluator (flexible, handles any rule)

rule_categories:
  # ==================================================================
  # CORE PROCESS RULES (Legacy - Keep hardcoded validation)
  # ==================================================================
  core_process_rules:
    - name: sequence
      description: Steps must be done in specific order
      validation_strategy: hardcoded
      examples:
        - "Credit check must happen before loan approval"
        - "Income verification precedes credit assessment"

    - name: approval
      description: Manager/authority approval requirements
      validation_strategy: hardcoded
      examples:
        - "Loans >$50K require manager approval"
        - "Final approval by senior officer"

    - name: timing
      description: Time constraints for process steps
      validation_strategy: hardcoded
      examples:
        - "Credit check within 48 hours"
        - "Application processing within 5 business days"

    - name: validation
      description: Data verification and checking requirements
      validation_strategy: hardcoded
      examples:
        - "Income documents must be verified"
        - "Credit score validation required"

  # ==================================================================
  # RISK & COMPLIANCE RULES
